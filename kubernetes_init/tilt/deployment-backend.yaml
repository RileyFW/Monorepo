apiVersion: apps/v1
kind: Deployment
metadata:
  name: glados-backend
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        image: backend
        ports:
        - containerPort: 5050
        env:
        - name: IMAGE_RUNNER
          value: runner
        # Phase 2 build orchestration (dev/minikube). REGISTRY_HOST is the in-cluster
        # registry used to push per-experiment images and check the build cache.
        # RUNNER_BASE_IMAGE is the base the Kaniko build layers deps onto; the bare
        # `runner-base` value is rewritten by Tilt (match_in_env_vars) to the pushed ref.
        - name: REGISTRY_HOST
          value: ctlptl-registry:5000
        - name: RUNNER_BASE_IMAGE
          value: runner-base
        - name: BACKEND_PORT
          valueFrom:
            secretKeyRef:
              name: secret-env
              key: BACKEND_PORT
        - name: MONGODB_PORT
          valueFrom:
            secretKeyRef:
              name: secret-env
              key: MONGODB_PORT
        - name: MONGODB_USERNAME
          valueFrom:
            secretKeyRef:
              name: secret-env
              key: MONGODB_USERNAME
        - name: MONGODB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: secret-env
              key: MONGODB_PASSWORD
