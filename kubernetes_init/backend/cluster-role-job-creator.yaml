kind: ClusterRole
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: job-creator
  namespace: default
rules:
# get/list/watch added so the backend can poll the Kaniko build Job to completion (Phase 2)
- apiGroups: ["batch"]
  resources: ["jobs"]
  verbs: ["create", "delete", "get", "list", "watch"]
# configmaps: the backend stages the Kaniko build context in a ConfigMap (Phase 2)
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["create", "delete", "get"]
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["pods/log"]
  verbs: ["get", "list"]
- apiGroups: ["apps"]
  resources: ["deployments"]
  verbs: ["patch"]
- apiGroups: [""]
  resources: ["nodes"]
  verbs: ["list", "get", "patch", "watch"]